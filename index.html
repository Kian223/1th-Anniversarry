        /* EFEK REKAYASA AMPLOP KLASIK (SURAT TERBUNGKUS RAPAT) */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            margin-top: 40px;
        }
        .envelope-back {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            background: #ff8fa3;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(244, 63, 94, 0.15);
            z-index: 1;
        }
        .letter-clipping {
            position: absolute;
            bottom: 10px;
            left: 15px;
            width: 290px;
            height: 160px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1), height 0.6s ease, z-index 0.6s;
            z-index: 2;
            opacity: 0;
            transform: translateY(0);
        }
        .envelope-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            background: #ffb3c1;
            border-radius: 0 0 16px 16px;
            clip-path: polygon(0 0, 0% 100%, 100% 100%, 100% 0, 50% 50%);
            z-index: 3;
            cursor: pointer;
        }
        .envelope-flap-top {
            position: absolute;
            top: 40px;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 100px solid #ff758f;
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 4;
            cursor: pointer;
        }
        
        /* State Saat Terbuka Sempurna */
        .envelope-container.opened .envelope-flap-top {
            transform: rotateX(180deg) translateY(40px);
            z-index: 1;
        }
        .envelope-container.opened .letter-clipping {
            transform: translateY(-150px);
            height: 330px;
            z-index: 5;
            opacity: 1;
        }

        .letter-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .letter-scroll::-webkit-scrollbar-thumb {
            background-color: #fca5a5;
            border-radius: 10px;
        }

        /* Custom Pop-Up Feedback */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 32, 44, 0.4);
            display: none;
            justify-content: center;
            align-items: center;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(freq, type, duration) {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function renderEnvelopeSlide() {

                        <p class="text-[11px] text-gray-500">Tap untuk buka surat! </p>

                    <div id="wrapper-envelope" class="envelope-container">

        function openEnvelope() {
            const wrapper = document.getElementById('wrapper-envelope');
            if(!wrapper.classList.contains('opened')) {
                initAudio();
                playBeep(440, 'sine', 0.2);
                wrapper.classList.add('opened');
                confetti({ particleCount: 35, spread: 65, origin: { y: 0.6 } });
            }
        }

        // Fungsi Membuka Galeri Foto Akhir
        function openGallery(event) {
            event.stopPropagation(); 
            playCorrectSound();
            currentScale = 1.0;
            currentPhotoIndex = 0; // Mulai dari foto pertama
            updateSliderView();
            document.getElementById('galleryOverlay').style.display = 'flex';
        }

        function closeGallery() {
            document.getElementById('galleryOverlay').style.display = 'none';
        }

        // Fungsi Logika Kontrol Navigasi Slider Foto (Mundur & Maju)
        function changeSlide(direction) {
            currentScale = 1.0; // Reset zoom setiap kali berpindah foto
            currentPhotoIndex += direction;
            
            if (currentPhotoIndex >= totalPhotos) {
                currentPhotoIndex = 0;
            }
            if (currentPhotoIndex < 0) {
                currentPhotoIndex = totalPhotos - 1;
            }
            updateSliderView();
        }

        function updateSliderView() {
            for (let i = 0; i < totalPhotos; i++) {
                const slide = document.getElementById(`slide-${i}`);
                const img = document.getElementById(`special-photo-${i}`);
                if (i === currentPhotoIndex) {
                    slide.classList.add('active');
                    img.style.transform = `scale(${currentScale})`;
                } else {
                    slide.classList.remove('active');
                }
            }
        }

        function zoomPhoto(amount) {
            currentScale += amount;
            if(currentScale < 0.5) currentScale = 0.5;
            if(currentScale > 3.0) currentScale = 3.0;
            
            const activeImg = document.getElementById(`special-photo-${currentPhotoIndex}`);
            activeImg.style.transform = `scale(${currentScale})`;
        }

        // Mengunduh foto sesuai slide aktif saat itu
        function downloadCurrentPhoto() {
            const link = document.createElement('a');
            link.href = photoFileNames[currentPhotoIndex];
            link.download = `Our_Special_Photo_${currentPhotoIndex + 1}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = function() {
            renderWelcome();
        };
    </script>
